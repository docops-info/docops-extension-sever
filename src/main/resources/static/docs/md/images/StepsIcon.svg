<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#4a90d9"/>
    </linearGradient>
    <linearGradient id="step1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6EAEFF"/>
      <stop offset="100%" style="stop-color:#4a7fbf"/>
    </linearGradient>
    <linearGradient id="step2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#69DEE5"/>
      <stop offset="100%" style="stop-color:#3fb5bc"/>
    </linearGradient>
    <linearGradient id="step3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F8BC95"/>
      <stop offset="100%" style="stop-color:#d4956a"/>
    </linearGradient>
    <linearGradient id="step4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D9AEF8"/>
      <stop offset="100%" style="stop-color:#a87cc9"/>
    </linearGradient>
    <linearGradient id="step5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A7E58A"/>
      <stop offset="100%" style="stop-color:#6fb85a"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="245" fill="url(#bg)"/>
  <!-- Isometric steps ascending left to right -->
  <!-- Step 1 (bottom-left) -->
  <g transform="translate(80, 340)">
    <polygon points="0,0 70,-35 140,0 70,35" fill="url(#step1)" stroke="#fff" stroke-width="1.5"/>
    <polygon points="0,0 0,40 70,75 70,35" fill="#4a7fbf" stroke="#fff" stroke-width="1.5"/>
    <polygon points="70,35 70,75 140,40 140,0" fill="#5a8fd0" stroke="#fff" stroke-width="1.5"/>
    <text x="70" y="8" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold" font-family="Arial, sans-serif">1</text>
  </g>
  <!-- Step 2 -->
  <g transform="translate(145, 295)">
    <polygon points="0,0 70,-35 140,0 70,35" fill="url(#step2)" stroke="#fff" stroke-width="1.5"/>
    <polygon points="0,0 0,40 70,75 70,35" fill="#3fb5bc" stroke="#fff" stroke-width="1.5"/>
    <polygon points="70,35 70,75 140,40 140,0" fill="#4fc5cc" stroke="#fff" stroke-width="1.5"/>
    <text x="70" y="8" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold" font-family="Arial, sans-serif">2</text>
  </g>
  <!-- Step 3 -->
  <g transform="translate(210, 250)">
    <polygon points="0,0 70,-35 140,0 70,35" fill="url(#step3)" stroke="#fff" stroke-width="1.5"/>
    <polygon points="0,0 0,40 70,75 70,35" fill="#d4956a" stroke="#fff" stroke-width="1.5"/>
    <polygon points="70,35 70,75 140,40 140,0" fill="#e0a57a" stroke="#fff" stroke-width="1.5"/>
    <text x="70" y="8" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold" font-family="Arial, sans-serif">3</text>
  </g>
  <!-- Step 4 -->
  <g transform="translate(275, 205)">
    <polygon points="0,0 70,-35 140,0 70,35" fill="url(#step4)" stroke="#fff" stroke-width="1.5"/>
    <polygon points="0,0 0,40 70,75 70,35" fill="#a87cc9" stroke="#fff" stroke-width="1.5"/>
    <polygon points="70,35 70,75 140,40 140,0" fill="#b88cd9" stroke="#fff" stroke-width="1.5"/>
    <text x="70" y="8" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold" font-family="Arial, sans-serif">4</text>
  </g>
  <!-- Step 5 (top-right) -->
  <g transform="translate(340, 160)">
    <polygon points="0,0 70,-35 140,0 70,35" fill="url(#step5)" stroke="#fff" stroke-width="1.5"/>
    <polygon points="0,0 0,40 70,75 70,35" fill="#6fb85a" stroke="#fff" stroke-width="1.5"/>
    <polygon points="70,35 70,75 140,40 140,0" fill="#7fc86a" stroke="#fff" stroke-width="1.5"/>
    <text x="70" y="8" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold" font-family="Arial, sans-serif">5</text>
  </g>
  <!-- Flag on top step -->
  <g transform="translate(400, 100)">
    <line x1="10" y1="60" x2="10" y2="0" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    <polygon points="12,0 40,10 12,20" fill="#F8BC95"/>
  </g>
  <!-- Label -->
  <text x="256" y="440" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="bold" font-family="Arial, sans-serif" letter-spacing="3">STEPS</text>
</svg>
